apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: portfolio
  name: portfolio-deployment
  labels:
    app: portfolio
spec:
  replicas: 3
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      containers:
      - name: portfolio
        image: biswajitrb/github-actions-app:latest
        ports:
        - containerPort: 80
